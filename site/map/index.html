<style>/* Color variables — automatically flipped in dark mode */
:root {
  /* Light mode */
  --color-text-primary: #171717;
  --color-text-secondary: #525252;
  --color-text-tertiary: #A3A3A3;
  --color-background-primary: #FFFFFF;
  --color-background-secondary: #F5F5F5;
  --color-border-primary: #E5E5E5;
  --color-border-secondary: #E5E5E5;
  --color-border-tertiary: #E5E5E5;

  /* Fixed across modes */
  --color-red: #FF4040;
  --color-red-hover: #E63636;
  --color-red-dark: #CC2020;
  --color-black: #000000;
  --color-white: #FFFFFF;

  /* Typography */
  --font-display: 'Space Grotesk', system-ui, sans-serif;
  --font-body: 'Source Serif 4', Georgia, serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  --space-3xl: 64px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --color-text-primary: #FAFAFA;
    --color-text-secondary: #A3A3A3;
    --color-text-tertiary: #737373;
    --color-background-primary: #171717;
    --color-background-secondary: #262626;
    --color-border-primary: #404040;
    --color-border-secondary: #525252;
    --color-border-tertiary: #262626;
  }
}

* {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--font-body);
  font-size: 17px;
  line-height: 1.7;
  color: var(--color-text-primary);
  background: var(--color-background-primary);
  transition: background 0.3s, color 0.3s;
}

/* Navigation */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--space-3xl);
  height: 64px;
  border-bottom: 0.5px solid var(--color-border-tertiary);
  position: sticky;
  top: 0;
  background: var(--color-background-primary);
  z-index: 40;
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  text-decoration: none;
  color: var(--color-text-secondary);
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 500;
}

.nav-mark {
  width: 24px;
  height: 24px;
  color: currentColor;
}

.nav-links {
  display: flex;
  gap: var(--space-xl);
  list-style: none;
  margin: 0;
  padding: 0;
}

.nav-links a {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 500;
  color: var(--color-text-secondary);
  text-decoration: none;
  transition: color 0.15s;
}

.nav-links a:hover,
.nav-links a.active {
  color: var(--color-red);
}

/* Page container */
.page {
  max-width: 680px;
  margin: 0 auto;
  padding: var(--space-3xl) var(--space-lg);
}

@media (max-width: 640px) {
  .page {
    padding: var(--space-lg);
  }
}

/* Buttons */
.btn {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 500;
  border: none;
  border-radius: 6px;
  padding: 10px 22px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-primary {
  background: var(--color-black);
  color: var(--color-white);
}

.btn-primary:hover {
  background: var(--color-text-secondary);
}

.btn-accent {
  background: var(--color-red);
  color: var(--color-white);
}

.btn-accent:hover {
  background: var(--color-red-hover);
}

.btn-ghost {
  background: transparent;
  color: var(--color-text-primary);
  border: 0.5px solid var(--color-border-secondary);
}

.btn-ghost:hover {
  background: var(--color-background-secondary);
}

/* Links */
a {
  color: var(--color-red);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color 0.15s;
}

a:hover {
  border-bottom-color: var(--color-red);
}

/* Typography */
h1 {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.025em;
  margin: 0 0 var(--space-lg) 0;
  color: var(--color-text-primary);
}

h2 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  line-height: 1.25;
  letter-spacing: -0.01em;
  margin: var(--space-2xl) 0 var(--space-md) 0;
  color: var(--color-text-primary);
}

h3 {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  line-height: 1.35;
  letter-spacing: -0.01em;
  margin: var(--space-xl) 0 var(--space-sm) 0;
  color: var(--color-text-primary);
}

p {
  margin: var(--space-lg) 0;
}

p:first-child {
  margin-top: 0;
}

/* Breadcrumb */
.breadcrumb {
  font-family: var(--font-display);
  font-size: 13px;
  color: var(--color-text-tertiary);
  margin-bottom: var(--space-xl);
}

.breadcrumb a {
  color: var(--color-text-secondary);
}

.breadcrumb-sep {
  margin: 0 var(--space-sm);
}

/* Piece header */
.piece-summary {
  font-family: var(--font-body);
  font-style: italic;
  font-size: 16px;
  line-height: 1.55;
  color: var(--color-text-secondary);
  margin: 0 0 var(--space-md) 0;
}

.piece-meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: var(--space-sm);
  margin-top: var(--space-md);
}

.meta-item {
  font-family: var(--font-display);
  font-size: 12px;
  color: var(--color-text-tertiary);
}

article {
  margin-top: var(--space-2xl);
  max-width: 600px;
}

/* Tags */
.tag-category {
  display: inline-block;
  background: #FFF0F0;
  color: var(--color-red-dark);
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 4px;
  margin-right: var(--space-sm);
}

@media (prefers-color-scheme: dark) {
  .tag-category {
    background: rgba(255, 64, 64, 0.1);
    color: #FF8080;
  }
}

.tag-label {
  display: inline-block;
  background: var(--color-background-secondary);
  color: var(--color-text-secondary);
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 4px;
  margin-right: var(--space-sm);
}

/* Grab bar (export buttons) */
.grab-bar {
  display: flex;
  gap: var(--space-md);
  padding: var(--space-lg) 0;
  margin: var(--space-2xl) 0;
  border-top: 0.5px solid var(--color-border-tertiary);
  border-bottom: 0.5px solid var(--color-border-tertiary);
}

@media (max-width: 640px) {
  .grab-bar {
    flex-direction: column;
  }

  .grab-bar .btn {
    width: 100%;
    text-align: center;
  }
}

/* Connection cards */
.connections {
  margin-top: var(--space-2xl);
  padding-top: var(--space-xl);
}

.connections h4 {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--color-text-tertiary);
  margin: 0 0 var(--space-lg) 0;
}

.conn-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: var(--space-md);
}

@media (max-width: 640px) {
  .conn-grid {
    grid-template-columns: 1fr;
  }
}

.conn-item {
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: 8px;
  padding: var(--space-md);
  background: var(--color-background-primary);
  text-decoration: none;
  color: inherit;
  transition: all 0.15s;
}

.conn-item:hover {
  border-color: var(--color-border-secondary);
  background: var(--color-background-secondary);
}

.conn-type {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--color-text-tertiary);
  display: block;
  margin-bottom: var(--space-sm);
}

.conn-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 14px;
  color: var(--color-red);
  display: block;
  margin-bottom: var(--space-xs);
}

.conn-summary {
  font-family: var(--font-body);
  font-size: 13px;
  font-style: italic;
  color: var(--color-text-secondary);
  line-height: 1.55;
  display: block;
}

.conn-label {
  font-size: 11px;
  font-style: italic;
  color: var(--color-text-tertiary);
  display: block;
  margin-top: var(--space-xs);
}

/* Pull quotes */
.pullquote {
  border-left: 3px solid var(--color-red);
  padding: var(--space-sm) 0 var(--space-sm) var(--space-lg);
  margin: var(--space-2xl) 0;
  font-family: var(--font-body);
  font-size: 18px;
  font-style: italic;
  line-height: 1.5;
  color: var(--color-text-primary);
}

/* Footer */
.footer {
  max-width: 680px;
  margin: 0 auto;
  padding: var(--space-3xl) var(--space-lg);
  border-top: 0.5px solid var(--color-border-tertiary);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--font-display);
  font-size: 12px;
  color: var(--color-text-secondary);
}

@media (max-width: 640px) {
  .footer {
    flex-direction: column;
    text-align: center;
    gap: var(--space-lg);
  }
}

    byId[n.id] = n;
  });
  var edges = EDGES.filter(function (e) { return byId[e[0]] && byId[e[1]]; });

  // force simulation: repulsion + springs + centering, with cooling
  var SPRING = 110;
  for (var it = 0; it < 300; it++) {
    var cool = 1 - it / 300;
    for (var i = 0; i < NODES.length; i++) {
      var a = NODES[i];
      a.vx = (W / 2 - a.x) * 0.002;
      a.vy = (H / 2 - a.y) * 0.002;
      for (var j = 0; j < NODES.length; j++) {
        if (i === j) continue;
        var b = NODES[j];
        var dx = a.x - b.x, dy = a.y - b.y;
        var d2 = dx * dx + dy * dy + 0.01;
        var f = 3000 / d2;
        var d = Math.sqrt(d2);
        a.vx += (dx / d) * f;
        a.vy += (dy / d) * f;
      }
    }
    edges.forEach(function (e) {
      var a = byId[e[0]], b = byId[e[1]];
      var dx = b.x - a.x, dy = b.y - a.y;
      var d = Math.sqrt(dx * dx + dy * dy) + 0.01;
      var f = (d - SPRING) * 0.02;
      a.vx += (dx / d) * f; a.vy += (dy / d) * f;
      b.vx -= (dx / d) * f; b.vy -= (dy / d) * f;
    });
    NODES.forEach(function (n) {
      n.x += n.vx * cool;
      n.y += n.vy * cool;
      n.x = Math.max(40, Math.min(W - 40, n.x));
      n.y = Math.max(30, Math.min(H - 30, n.y));
    });
  }

  var NS = 'http://www.w3.org/2000/svg';
  var edgeEls = [], nodeEls = [], labelEls = [];

  edges.forEach(function (e) {
    var a = byId[e[0]], b = byId[e[1]];
    var line = document.createElementNS(NS, 'line');
    line.setAttribute('x1', a.x); line.setAttribute('y1', a.y);
    line.setAttribute('x2', b.x); line.setAttribute('y2', b.y);
    line.setAttribute('class', 'edge');
    svg.appendChild(line);
    edgeEls.push({ el: line, s: e[0], t: e[1] });
  });

  NODES.forEach(function (n) {
    var label = document.createElementNS(NS, 'text');
    label.setAttribute('x', n.x);
    label.setAttribute('y', n.y - 13);
    label.setAttribute('class', 'node-label');
    label.textContent = n.title.length > 16 ? n.title.slice(0, 15) + '…' : n.title;
    svg.appendChild(label);
    labelEls.push({ el: label, n: n });

    var c = document.createElementNS(NS, 'circle');
    c.setAttribute('cx', n.x); c.setAttribute('cy', n.y);
    c.setAttribute('r', 7);
    c.setAttribute('style', 'fill:' + (COLORS[n.category] || '#999'));
    c.setAttribute('stroke', 'var(--color-background-primary)');
    c.setAttribute('stroke-width', 2);
    c.setAttribute('class', 'node-circle');
    c.addEventListener('mouseenter', function () { focusNode(n, c); });
    c.addEventListener('mouseleave', clearFocus);
    c.addEventListener('click', function () { window.location.href = '/ideas/' + n.id + '/'; });
    svg.appendChild(c);
    nodeEls.push({ el: c, n: n });
  });

  function neighbors(id) {
    var set = { }; set[id] = true;
    edges.forEach(function (e) {
      if (e[0] === id) set[e[1]] = true;
      if (e[1] === id) set[e[0]] = true;
    });
    return set;
  }

  function focusNode(n, c) {
    c.setAttribute('r', 10);
    var near = neighbors(n.id);
    nodeEls.forEach(function (x) { x.el.classList.toggle('dimmed', !near[x.n.id]); });
    labelEls.forEach(function (x) { x.el.classList.toggle('dimmed', !near[x.n.id]); });
    edgeEls.forEach(function (x) {
      var on = x.s === n.id || x.t === n.id;
      x.el.classList.toggle('highlight', on);
      x.el.classList.toggle('dimmed', !on);
    });
    tooltip.innerHTML =
      '<div class="tooltip-category">' + (COLORS_LABEL[n.category] || n.category) + '</div>' +
      '<div class="tooltip-title">' + n.title + '</div>' +
      '<div class="tooltip-summary">' + n.summary + '</div>' +
      '<div class="tooltip-link">Click to read →</div>';
    tooltip.style.display = 'block';
    var scale = area.clientWidth / W;
    var tx = n.x * scale + 14, ty = n.y * scale + 14;
    if (tx + 270 > area.clientWidth) tx = n.x * scale - 274;
    if (ty + 140 > area.clientHeight) ty = n.y * scale - 150;
    tooltip.style.left = Math.max(8, tx) + 'px';
    tooltip.style.top = Math.max(8, ty) + 'px';
  }

  function clearFocus() {
    tooltip.style.display = 'none';
    nodeEls.forEach(function (x) { x.el.setAttribute('r', 7); x.el.classList.remove('dimmed'); });
    labelEls.forEach(function (x) { x.el.classList.remove('dimmed'); });
    edgeEls.forEach(function (x) { x.el.classList.remove('highlight'); x.el.classList.remove('dimmed'); });
  }

  window.setFilter = function (cat, btn) {
    document.querySelectorAll('#filters .filter-pill').forEach(function (p) { p.classList.remove('active'); });
    if (btn) btn.classList.add('active');
    nodeEls.forEach(function (x) {
      x.el.classList.toggle('dimmed', cat !== 'all' && x.n.category !== cat);
    });
    labelEls.forEach(function (x) {
      x.el.classList.toggle('dimmed', cat !== 'all' && x.n.category !== cat);
    });
    edgeEls.forEach(function (x) {
      var sOk = cat === 'all' || byId[x.s].category === cat;
      var tOk = cat === 'all' || byId[x.t].category === cat;
      x.el.classList.toggle('dimmed', !(sOk && tOk));
    });
  };
})();

var COLORS_LABEL = {"concepts": "Concepts", "services": "Services", "work": "Work", "about": "About", "reflections": "Reflections", "frameworks": "Frameworks"};
</script>
