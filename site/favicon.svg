<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <style>
    .ring { fill: none; stroke: #000000; stroke-width: 28; }
    .dot { fill: #000000; }
    @media (prefers-color-scheme: dark) {
      .ring { stroke: #FFFFFF; }
      .dot { fill: #FFFFFF; }
    }
  </style>
  <circle class="ring" cx="256" cy="256" r="170"/>
